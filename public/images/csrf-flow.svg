<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <style>
      .title { fill: #0f172a; font-size: 18px; font-weight: 700; text-anchor: middle; }
      .actor { fill: #f0fdf4; stroke: #22c55e; stroke-width: 2; }
      .actor-bank { fill: #dbeafe; stroke: #3b82f6; stroke-width: 2; }
      .actor-evil { fill: #fef2f2; stroke: #ef4444; stroke-width: 2; }
      .actor-text { font-size: 14px; font-weight: 600; text-anchor: middle; }
      .msg { fill: none; stroke: #64748b; stroke-width: 1.5; marker-end: url(#arrow); }
      .msg-text { fill: #334155; font-size: 12px; }
      .note { fill: #fef3c7; stroke: #f59e0b; stroke-width: 1.5; }
      .note-text { fill: #92400e; font-size: 11px; text-anchor: middle; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b" />
    </marker>
  </defs>
  <text x="400" y="25" class="title">CSRF 攻击时序图</text>
  <rect x="30" y="50" width="120" height="36" rx="18" class="actor" />
  <text x="90" y="73" class="actor-text">用户浏览器</text>
  <rect x="320" y="50" width="140" height="36" rx="18" class="actor-bank" />
  <text x="390" y="73" class="actor-text">bank.com</text>
  <rect x="610" y="50" width="140" height="36" rx="18" class="actor-evil" />
  <text x="680" y="73" class="actor-text">evil.com</text>
  <line x1="90" y1="86" x2="90" y2="340" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4" />
  <line x1="390" y1="86" x2="390" y2="340" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4" />
  <line x1="680" y1="86" x2="680" y2="340" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4" />
  <line x1="90" y1="120" x2="390" y2="120" class="msg" />
  <text x="240" y="113" class="msg-text" text-anchor="middle">登录 bank.com</text>
  <line x1="390" y1="145" x2="90" y2="145" class="msg" />
  <text x="240" y="138" class="msg-text" text-anchor="middle">Set-Cookie: session=abc123</text>
  <line x1="90" y1="175" x2="680" y2="175" class="msg" />
  <text x="385" y="168" class="msg-text" text-anchor="middle">访问 evil.com（正常浏览）</text>
  <line x1="680" y1="200" x2="90" y2="200" class="msg" />
  <text x="385" y="193" class="msg-text" text-anchor="middle">返回恶意页面</text>
  <line x1="90" y1="230" x2="390" y2="230" class="msg" />
  <text x="240" y="223" class="msg-text" text-anchor="middle">自动提交表单到 bank.com/transfer</text>
  <rect x="240" y="238" width="200" height="36" rx="6" class="note" />
  <text x="340" y="253" class="note-text">浏览器自动携带</text>
  <text x="340" y="267" class="note-text">session=abc123</text>
  <line x1="390" y1="300" x2="90" y2="300" class="msg" />
  <text x="240" y="293" class="msg-text" text-anchor="middle">转账成功（认为是用户操作）</text>
  <rect x="250" y="330" width="300" height="28" rx="14" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5" />
  <text x="400" y="349" fill="#dc2626" font-size="12" text-anchor="middle" font-weight="600">利用浏览器自动携带 Cookie 的机制</text>
</svg>
