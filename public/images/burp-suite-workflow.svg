<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <style>
      .title { fill: #0f172a; font-size: 18px; font-weight: 700; text-anchor: middle; }
      .root { fill: #1e40af; }
      .root-text { fill: white; font-size: 15px; font-weight: 600; text-anchor: middle; }
      .module { fill: #dbeafe; stroke: #3b82f6; stroke-width: 1.5; }
      .module-text { fill: #1e40af; font-size: 13px; font-weight: 600; text-anchor: middle; }
      .detail { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; }
      .detail-text { fill: #475569; font-size: 11px; text-anchor: middle; }
      .line { stroke: #94a3b8; stroke-width: 1.5; fill: none; }
    </style>
  </defs>
  <text x="450" y="25" class="title">Burp Suite 核心工作流</text>
  <rect x="370" y="45" width="160" height="40" rx="20" class="root" />
  <text x="450" y="70" class="root-text">浏览器代理 127.0.0.1:8080</text>
  <line x1="450" y1="85" x2="450" y2="125" class="line" />
  <rect x="350" y="125" width="200" height="36" rx="18" class="module" />
  <text x="450" y="148" class="module-text">Burp Proxy 拦截</text>
  <line x1="450" y1="161" x2="100" y2="210" class="line" />
  <line x1="450" y1="161" x2="310" y2="210" class="line" />
  <line x1="450" y1="161" x2="520" y2="210" class="line" />
  <line x1="450" y1="161" x2="730" y2="210" class="line" />
  <rect x="20" y="210" width="160" height="34" rx="8" class="module" />
  <text x="100" y="231" class="module-text">Repeater 反复重放</text>
  <rect x="230" y="210" width="160" height="34" rx="8" class="module" />
  <text x="310" y="231" class="module-text">Intruder 暴力枚举</text>
  <rect x="440" y="210" width="160" height="34" rx="8" class="module" />
  <text x="520" y="231" class="module-text">Decoder 格式转换</text>
  <rect x="650" y="210" width="160" height="34" rx="8" class="module" />
  <text x="730" y="231" class="module-text">Scanner 漏洞检测</text>
  <line x1="100" y1="244" x2="100" y2="280" class="line" />
  <rect x="20" y="280" width="160" height="34" rx="8" class="detail" />
  <text x="100" y="298" class="detail-text">SQL 注入 / XSS / 逻辑漏洞</text>
  <rect x="20" y="320" width="160" height="34" rx="8" class="detail" />
  <text x="100" y="338" class="detail-text">手动修改参数反复测试</text>
  <line x1="310" y1="244" x2="310" y2="280" class="line" />
  <rect x="230" y="280" width="160" height="34" rx="8" class="detail" />
  <text x="310" y="298" class="detail-text">目录枚举 / 密码爆破 / 参数 Fuzz</text>
  <rect x="230" y="320" width="160" height="34" rx="8" class="detail" />
  <text x="310" y="338" class="detail-text">4 种攻击类型可选</text>
  <line x1="520" y1="244" x2="520" y2="280" class="line" />
  <rect x="440" y="280" width="160" height="34" rx="8" class="detail" />
  <text x="520" y="298" class="detail-text">URL 编码 / Base64 / HTML 实体</text>
  <line x1="730" y1="244" x2="730" y2="280" class="line" />
  <rect x="650" y="280" width="160" height="34" rx="8" class="detail" />
  <text x="730" y="298" class="detail-text">常见漏洞自动检测</text>
  <rect x="300" y="365" width="300" height="28" rx="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" />
  <text x="450" y="384" fill="#92400e" font-size="12" text-anchor="middle" font-weight="500">Burp 核心价值：让你看到和控制每一个 HTTP 请求</text>
</svg>
