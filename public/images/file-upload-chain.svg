<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <style>
      .title { fill: #0f172a; font-size: 18px; font-weight: 700; text-anchor: middle; }
      .step { fill: #dbeafe; stroke: #3b82f6; stroke-width: 1.5; }
      .step-text { fill: #1e40af; font-size: 13px; font-weight: 600; text-anchor: middle; }
      .danger { fill: #fef2f2; stroke: #ef4444; stroke-width: 1.5; }
      .danger-text { fill: #dc2626; font-size: 13px; font-weight: 600; text-anchor: middle; }
      .safe { fill: #f0fdf4; stroke: #22c55e; stroke-width: 1.5; }
      .safe-text { fill: #166534; font-size: 13px; font-weight: 600; text-anchor: middle; }
      .arrow { stroke: #94a3b8; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .arrow-bad { stroke: #ef4444; stroke-width: 1.5; fill: none; marker-end: url(#arrow-r); }
      .arrow-ok { stroke: #22c55e; stroke-width: 1.5; fill: none; marker-end: url(#arrow-g); }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8" />
    </marker>
    <marker id="arrow-r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ef4444" />
    </marker>
    <marker id="arrow-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22c55e" />
    </marker>
  </defs>
  <text x="450" y="25" class="title">文件上传攻击链</text>
  <rect x="15" y="60" width="120" height="36" rx="18" class="step" />
  <text x="75" y="83" class="step-text">1. 上传文件</text>
  <line x1="135" y1="78" x2="195" y2="78" class="arrow" />
  <rect x="195" y="60" width="120" height="36" rx="18" class="step" />
  <text x="255" y="83" class="step-text">2. 通过校验？</text>
  <line x1="315" y1="78" x2="375" y2="78" class="arrow-bad" />
  <rect x="375" y="60" width="120" height="36" rx="18" class="step" />
  <text x="435" y="83" class="step-text">3. 文件存储</text>
  <line x1="495" y1="78" x2="555" y2="78" class="arrow-bad" />
  <rect x="555" y="60" width="120" height="36" rx="18" class="step" />
  <text x="615" y="83" class="step-text">4. Web 可访问</text>
  <line x1="675" y1="78" x2="735" y2="78" class="arrow-bad" />
  <rect x="735" y="60" width="150" height="36" rx="18" class="danger" />
  <text x="810" y="83" class="danger-text">5. 按后缀解析执行</text>
  <line x1="810" y1="96" x2="810" y2="130" class="arrow-bad" />
  <rect x="735" y="130" width="150" height="36" rx="18" class="danger" />
  <text x="810" y="153" class="danger-text">RCE 远程代码执行</text>
  <text x="400" y="130" fill="#64748b" font-size="12" font-weight="500">← 攻击链，每个环节都可能被突破</text>
  <text x="400" y="180" fill="#166534" font-size="13" font-weight="600" text-anchor="middle">防御：在每个环节加阻断</text>
  <rect x="15" y="210" width="140" height="32" rx="16" class="safe" />
  <text x="85" y="231" class="safe-text">白名单校验后缀</text>
  <rect x="175" y="210" width="140" height="32" rx="16" class="safe" />
  <text x="245" y="231" class="safe-text">UUID 随机文件名</text>
  <rect x="335" y="210" width="140" height="32" rx="16" class="safe" />
  <text x="405" y="231" class="safe-text">存储到非 Web 目录</text>
  <rect x="495" y="210" width="140" height="32" rx="16" class="safe" />
  <text x="565" y="231" class="safe-text">对象存储 OSS</text>
  <rect x="655" y="210" width="140" height="32" rx="16" class="safe" />
  <text x="725" y="231" class="safe-text">取消上传目录解析</text>
  <rect x="15" y="270" width="140" height="32" rx="16" class="safe" />
  <text x="85" y="291" class="safe-text">校验文件内容/大小</text>
  <rect x="175" y="270" width="140" height="32" rx="16" class="safe" />
  <text x="245" y="291" class="safe-text">Nginx 层禁止解析</text>
  <rect x="335" y="270" width="140" height="32" rx="16" class="safe" />
  <text x="405" y="291" class="safe-text">强制 Content-Disposition</text>
  <rect x="495" y="270" width="140" height="32" rx="16" class="safe" />
  <text x="565" y="291" class="safe-text">图片马检测</text>
  <rect x="655" y="270" width="140" height="32" rx="16" class="safe" />
  <text x="725" y="291" class="safe-text">.htaccess 过滤</text>
  <rect x="250" y="330" width="400" height="28" rx="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" />
  <text x="450" y="349" fill="#92400e" font-size="12" text-anchor="middle" font-weight="500">永远不要相信客户端传来的"文件名"和"文件类型"</text>
</svg>
