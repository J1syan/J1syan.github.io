<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <style>
      .actor { fill: #f0fdf4; stroke: #22c55e; stroke-width: 2; }
      .actor-app { fill: #dbeafe; stroke: #3b82f6; stroke-width: 2; }
      .actor-db { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; }
      .actor-text { font-size: 14px; font-weight: 600; text-anchor: middle; }
      .msg { fill: none; stroke: #64748b; stroke-width: 1.5; marker-end: url(#arrow); }
      .msg-text { fill: #334155; font-size: 12px; }
      .note { fill: #fef2f2; stroke: #ef4444; stroke-width: 1.5; }
      .note-text { fill: #dc2626; font-size: 11px; text-anchor: middle; }
      .title { fill: #0f172a; font-size: 16px; font-weight: 700; text-anchor: middle; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b" />
    </marker>
  </defs>

  <text x="400" y="25" class="title">SQL 注入攻击时序图</text>

  <!-- Actors -->
  <rect x="30" y="50" width="120" height="36" rx="18" class="actor" />
  <text x="90" y="73" class="actor-text">攻击者</text>

  <rect x="300" y="50" width="140" height="36" rx="18" class="actor-app" />
  <text x="370" y="73" class="actor-text">Web 应用</text>

  <rect x="590" y="50" width="140" height="36" rx="18" class="actor-db" />
  <text x="660" y="73" class="actor-text">数据库</text>

  <!-- Lifelines -->
  <line x1="90" y1="86" x2="90" y2="340" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4" />
  <line x1="370" y1="86" x2="370" y2="340" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4" />
  <line x1="660" y1="86" x2="660" y2="340" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4" />

  <!-- Message 1 -->
  <line x1="90" y1="120" x2="370" y2="120" class="msg" />
  <text x="230" y="113" class="msg-text" text-anchor="middle">GET /user?id=1' OR 1=1--</text>

  <!-- Message 2 -->
  <line x1="370" y1="160" x2="660" y2="160" class="msg" />
  <text x="515" y="153" class="msg-text" text-anchor="middle">SELECT * FROM users WHERE id='1' OR 1=1--'</text>

  <!-- Note -->
  <rect x="440" y="170" width="220" height="36" rx="6" class="note" />
  <text x="550" y="186" class="note-text">条件永远为真</text>
  <text x="550" y="200" class="note-text">返回所有记录</text>

  <!-- Message 3 -->
  <line x1="660" y1="240" x2="370" y2="240" class="msg" />
  <text x="515" y="233" class="msg-text" text-anchor="middle">返回所有用户数据</text>

  <!-- Message 4 -->
  <line x1="370" y1="280" x2="90" y2="280" class="msg" />
  <text x="230" y="273" class="msg-text" text-anchor="middle">泄漏全部用户信息</text>

  <!-- Bottom note -->
  <rect x="250" y="310" width="300" height="30" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" />
  <text x="400" y="330" fill="#92400e" font-size="12" text-anchor="middle" font-weight="500">本质：用户输入被当作 SQL 语法执行</text>
</svg>
